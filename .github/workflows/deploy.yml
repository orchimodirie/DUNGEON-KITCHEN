name: Deploy WebAssembly to GitHub Pages

on:
  push:
    branches: [ "main" ] 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Emscripten (Wasm Compiler)
        uses: mymindstorm/setup-emsdk@v14

      - name: Compile C++ to WebAssembly
        run: |
          mkdir -p public
          em++ -std=c++20 -I include src/main.cpp src/game.cpp src/displayUI.cpp src/Inventory.cpp -s ASYNCIFY -o public/index.html
          sed -i 's/<canvas/<canvas style="display:none;"/g' public/index.html
          sed -i 's/<\/head>/<style>#output { height: 80vh !important; font-size: 18px !important; }<\/style><\/head>/g' public/index.html
          
      - name: Upload Web Files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4